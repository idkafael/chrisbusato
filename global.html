  // Intro

  document.getElementById("t-bodyText").textContent   = l.bodyText;
  document.getElementById("btn-start-quiz").textContent = l.btnStart;

  // Loading
  document.getElementById("t-loadTag").textContent      = l.loadTag;
  document.getElementById("t-loadTitle").textContent    = l.loadTitle;
  document.getElementById("t-loadSubtitle").textContent = l.loadSubtitle;

  // Result
  document.getElementById("t-resultTag").textContent     = l.resultTag;
  document.getElementById("btn-wpp").textContent         = l.btnCta;
  document.getElementById("result-cta-small").textContent = l.ctaSmall;

  // Modal
  document.getElementById("t-modalTitle").textContent    = l.modalTitle;
  document.getElementById("t-modalSubtitle").textContent = l.modalSubtitle;
  document.getElementById("t-emailLabel").textContent    = l.emailLabel;
  document.getElementById("t-phoneLabel").textContent    = l.phoneLabel;
  document.getElementById("t-btnContinue").textContent   = l.btnContinue;
  document.getElementById("t-btnSkip").textContent       = l.btnSkip;

  // Switch to intro
  document.getElementById("s-lang").classList.remove("active");
  document.getElementById("s-intro").classList.add("active");
}

/* ════════════════════════════════════════════════
   QUIZ LOGIC
════════════════════════════════════════════════ */
function startQuizFromIntro() { startQuiz(); }

function startQuiz() {
  if (!lead.email || !lead.phone) { openLeadModal(); return; }
  startQuizAfterLead();
}

function startQuizAfterLead() {
  cur = 0; answers = []; sel = null;
  document.getElementById("s-intro").classList.remove("active");
  document.getElementById("s-quiz").classList.add("active");
  render();
}

function render() {
  const l = T[currentLang];
  const q = l.questions[cur];
  document.getElementById("q-counter").textContent = l.questionOf(cur + 1, l.questions.length);
  document.getElementById("q-text").textContent    = q.text;
  document.getElementById("prog").style.width      = `${(cur / l.questions.length) * 100}%`;
  document.getElementById("btn-next").disabled     = true;
  document.getElementById("btn-next").textContent  = l.btnNext;
  sel = null;

  const opts = document.getElementById("q-options");
  opts.innerHTML = "";
  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerHTML = `<span class="opt-letter">${opt.l}</span><span>${opt.t}</span>`;
    btn.onclick = () => {
      document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      sel = opt.type;
      document.getElementById("btn-next").disabled = false;
    };
    opts.appendChild(btn);
  });
}

function nextQ() {
  if (!sel) return;
  answers.push(sel);
  cur++;
  const total = T[currentLang].questions.length;
  if (cur < total) { render(); }
  else { showLoadingThenResult(); }
}

function showLoadingThenResult() {
  document.getElementById("s-quiz").classList.remove("active");
  document.getElementById("s-loading").classList.add("active");
  document.getElementById("prog").style.width = "100%";
  setTimeout(() => {
    document.getElementById("s-loading").classList.remove("active");
    showResult();
  }, 3000);
}

/* ════════════════════════════════════════════════
   RESULT
════════════════════════════════════════════════ */
function dominantBodyAmongRDS(pct) {
  const r = pct.R, d = pct.D, s = pct.S;
  if (r >= d && r >= s) return "R";
  if (d >= s) return "D";
  return "S";
}

function countAnswerTypes(ansList) {
  const cnt = { R: 0, D: 0, M: 0, S: 0 };
  ansList.forEach(a => { if (cnt[a] !== undefined) cnt[a] += 1; });
  return cnt;
}

function computeBodyPercentages(cnt) {
  const M = 3 + Math.floor(Math.random() * 3);
  const minEach = 15;
  let r = minEach, d = minEach, s = minEach;
  const pool = 100 - M - r - d - s;
  const wR = cnt.R + 0.25, wD = cnt.D + 0.25, wS = cnt.S + 0.25;
  const t = wR + wD + wS;
  const er = Math.floor((pool * wR) / t);
  const ed = Math.floor((pool * wD) / t);
  const es = pool - er - ed;
  r += er; d += ed; s += es;
  const sum = r + d + s + M;
  if (sum !== 100) {
    const fix = 100 - sum;
    if (cnt.R >= cnt.D && cnt.R >= cnt.S) r += fix;
    else if (cnt.D >= cnt.S) d += fix;
    else s += fix;
  }
  return { R: r, D: d, S: s, M };
}

function renderPercentageMap(pct) {
  const l = T[currentLang];
  const rows = [
    { key: "R", cls: "r" }, { key: "D", cls: "d" },
    { key: "S", cls: "s" }, { key: "M", cls: "m" }
  ];
  const el = document.getElementById("map-bars");
  el.innerHTML = "";
  rows.forEach(({ key, cls }) => {
    const v = pct[key];
    const wrap = document.createElement("div");
    wrap.className = "map-row";
    wrap.innerHTML =
      `<div class="map-row-head"><span class="map-label">${l.barLabels[key]}</span><span class="map-pct">${v}%</span></div>` +
      `<div class="map-bar-track"><div class="map-bar-fill map-bar-fill--${cls}" data-w="${v}"></div></div>`;
    el.appendChild(wrap);
  });
  requestAnimationFrame(() => {
    el.querySelectorAll(".map-bar-fill").forEach(bar => {
      bar.style.width = bar.getAttribute("data-w") + "%";
    });
  });
}

function showResult() {
  const l = T[currentLang];
  const cnt = countAnswerTypes(answers);
  const pct = computeBodyPercentages(cnt);
  const domKey = dominantBodyAmongRDS(pct);

  document.getElementById("map-diagnosis-title").textContent = l.diagnosisTitles[domKey];
  document.getElementById("s-intro").classList.remove("active");
  document.getElementById("s-quiz").classList.remove("active");
  document.getElementById("s-loading").classList.remove("active");
  document.getElementById("s-result").classList.add("active");
  document.getElementById("prog").style.width = "100%";
  renderPercentageMap(pct);
  submitQuizToSupabase(answers);
  fbqTrack("CompleteRegistration", "Quiz Global " + currentLang.toUpperCase(), lead.email, lead.phone);
}

function goWpp() {
  var em = (lead && lead.email) ? encodeURIComponent(lead.email) : "";
  var ph = (lead && lead.phone) ? encodeURIComponent(lead.phone) : "";
  var url = "/grupo" + (em || ph ? "?email=" + em + "&phone=" + ph : "");
  window.location.href = url;
}

const TYPE_TO_LETTER = { R: "A", D: "B", M: "C", S: "D" };

function readQuizRowRef() {
  try { const r = localStorage.getItem(QUIZ_ROW_STORAGE_KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function saveQuizRowRef(o) {
  try { localStorage.setItem(QUIZ_ROW_STORAGE_KEY, JSON.stringify(o)); } catch(e) {}
}

function submitQuizToSupabase(ansList) {
  if (!lead || !lead.email || !lead.phone) return;
  if (!ansList || ansList.length !== 10) return;
  const letterPayload = {};
  for (let i = 0; i < 10; i++) {
    const L = TYPE_TO_LETTER[ansList[i]];
    if (!L) return;
    letterPayload["q" + (i + 1)] = L;
  }
  const payload = { email: lead.email, phone: lead.phone, full_name: lead.full_name || null, source: "global_" + currentLang };
  for (let j = 1; j <= 10; j++) payload["q" + j] = letterPayload["q" + j];
  fetch("/api/submit-quiz", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  }).catch(() => {});
}

/* ════════════════════════════════════════════════
   LEAD MODAL
════════════════════════════════════════════════ */
function openLeadModal() {
  const err = document.getElementById("lead-error");
  err.textContent = ""; err.classList.remove("active");
  document.getElementById("lead-email").value = "";
  leadPhoneSetDialInUi("55");
  document.getElementById("lead-phone").value = "";
  const ccCustomEl = document.getElementById("lead-phone-cc-custom");
  if (ccCustomEl) ccCustomEl.value = "";
  const saved = localStorage.getItem("lead");
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      if (parsed && typeof parsed === "object") {
        if (parsed.email) document.getElementById("lead-email").value = parsed.email;
        if (parsed.phone) {
          const full = normalizePhone(parsed.phone);
          const parts = splitStoredDigitsToCcAndNational(full, parsed.phone_dial || "");
          leadPhoneSetDialInUi(parts.cc);
          const natEl = document.getElementById("lead-phone");
          natEl.value = parts.cc === "55" ? formatPhoneBR11(parts.national) : parts.national;
        }
      }
    } catch {}
  }
  leadPhoneSyncCustomCcVisibility();
  leadPhoneRefreshNationalFieldConstraints();
  document.getElementById("lead-modal").classList.add("active");
  setTimeout(() => document.getElementById("lead-email").focus(), 0);
}

function closeLeadModal() {
  document.getElementById("lead-modal").classList.remove("active");
}

document.getElementById("lead-modal").addEventListener("click", e => {
  if (e.target && e.target.id === "lead-modal") closeLeadModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeLeadModal(); });

document.getElementById("lead-form").addEventListener("submit", e => {
  e.preventDefault();
  const l = T[currentLang];
  const email = document.getElementById("lead-email").value.trim();
  const err = document.getElementById("lead-error");
  err.textContent = ""; err.classList.remove("active");

  if (!isValidEmail(email)) {
    err.textContent = l.emailError; err.classList.add("active"); return;
  }
  if (!isValidPhoneLeadForm()) {
    const b = leadPhoneNationalBounds(leadPhoneGetDialCode());
    err.textContent = l.phoneError(b.min, b.max); err.classList.add("active"); return;
  }

  const phoneFull = leadPhoneFullDigitsFromForm();
  const dialUsed  = leadPhoneGetDialCode();
  lead = { email, phone: phoneFull, phone_dial: dialUsed, full_name: "" };
  localStorage.setItem("lead", JSON.stringify(lead));

  fetch("/api/start-quiz-submission", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: lead.email, phone: lead.phone, source: "global_" + currentLang })
  }).then(r => r.json()).then(j => {
    if (j && j.id) saveQuizRowRef({ id: String(j.id), email, phone: lead.phone, completed: false });
    fbqTrack("Lead", "Quiz Global " + currentLang.toUpperCase(), email, lead.phone);
  }).catch(() => {}).finally(() => {
    closeLeadModal();
    startQuizAfterLead();
  });
});

/* ════════════════════════════════════════════════
   META PIXEL HELPER
════════════════════════════════════════════════ */
function fbqTrack(eventName, contentName, email, phone) {
  if (typeof fbq === "undefined") return;
  var enc = new TextEncoder();
  function sha256hex(str) {
    return crypto.subtle.digest("SHA-256", enc.encode(str)).then(buf =>
      Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("")
    );
  }
  var emNorm = (email || "").toLowerCase().trim();
  var phNorm = (phone || "").replace(/\D/g,"");
  if (!phNorm.startsWith("55")) phNorm = "55" + phNorm;
  Promise.all([
    emNorm ? sha256hex(emNorm) : Promise.resolve(""),
    phNorm ? sha256hex(phNorm) : Promise.resolve("")
  ]).then(h => {
    var ud = {};
    if (h[0]) ud.em = h[0];
    if (h[1]) ud.ph = h[1];
    fbq("init","1659916645332253", ud);
    fbq("track", eventName, { content_name: contentName });
  }).catch(() => { fbq("track", eventName, { content_name: contentName }); });
}

/* ════════════════════════════════════════════════
   PHONE UTILITIES (same as index.html)
════════════════════════════════════════════════ */
function normalizePhone(raw) {
  let d = String(raw || "").replace(/\D/g, "");
  if (d.startsWith("0039") && d.length >= 4) d = "39" + d.slice(4);
  return d;
}

const LEAD_PHONE_CC_PREFIXES = ["598","595","351","244","258","238","86","81","91","57","56","54","52","51","49","44","39","34","33","55"];
const LEAD_PHONE_NATIONAL_BY_CC = {
  "55":{min:11,max:11},"39":{min:10,max:10,firstDigit:"3"},"351":{min:9,max:9},
  "1":{min:10,max:10},"54":{min:10,max:11},"56":{min:9,max:9},"57":{min:10,max:10},
  "51":{min:9,max:9},"598":{min:8,max:9},"595":{min:9,max:9},"34":{min:9,max:9},
  "33":{min:9,max:9},"49":{min:10,max:11},"44":{min:10,max:10},"52":{min:10,max:10},
  "81":{min:10,max:10},"86":{min:11,max:11},"91":{min:10,max:10},"244":{min:9,max:9},
  "258":{min:9,max:9},"238":{min:7,max:7}
};

function leadPhoneNationalBounds(cc) {
  let t = String(cc||"").replace(/\D/g,"").replace(/^0+/,"");
  if (t.length > 3) t = t.slice(0,3);
  if (!t) return {min:6,max:12};
  const row = LEAD_PHONE_NATIONAL_BY_CC[t];
  if (row) return {min:row.min,max:row.max,firstDigit:row.firstDigit};
  const maxNat = 15 - t.length;
  const minNat = Math.max(4, 10 - t.length);
  return {min:Math.min(minNat,maxNat),max:maxNat};
}

function leadPhoneSyncCustomCcVisibility() {
  const sel = document.getElementById("lead-phone-cc");
  const custom = document.getElementById("lead-phone-cc-custom");
  if (!sel || !custom) return;
  const on = sel.value === "__custom__";
  custom.classList.toggle("is-visible", on);
  if (!on) custom.value = "";
}

function leadPhoneGetDialCode() {
  const sel = document.getElementById("lead-phone-cc");
  const custom = document.getElementById("lead-phone-cc-custom");
  if (!sel) return "55";
  if (sel.value === "__custom__") {
    const c = normalizePhone(custom && custom.value ? custom.value : "");
    return c.replace(/^0+/,"").slice(0,3) || "";
  }
  return sel.value;
}

function leadPhoneGetNationalDigits() {
  const el = document.getElementById("lead-phone");
  return normalizePhone(el && el.value ? el.value : "");
}

function leadPhoneFullDigitsFromForm() {
  const cc = leadPhoneGetDialCode();
  const nat = leadPhoneGetNationalDigits();
  if (!cc || !nat) return "";
  return cc + nat;
}

function leadPhoneRefreshNationalFieldConstraints() {
  const nat = document.getElementById("lead-phone");
  if (!nat) return;
  const cc = leadPhoneGetDialCode() || "55";
  const b = leadPhoneNationalBounds(cc);
  if (cc === "55") { nat.maxLength = 14; nat.placeholder = "(11) 99999-9999"; }
  else { nat.maxLength = b.max; nat.placeholder = b.min === b.max ? b.max + " digits" : b.min + "–" + b.max + " digits"; }
  let d = normalizePhone(nat.value);
  if (d.length > b.max) { d = d.slice(0,b.max); nat.value = cc === "55" ? formatPhoneBR11(d) : d; }
}

function leadPhoneSetDialInUi(ccDigits) {
  const sel = document.getElementById("lead-phone-cc");
  const custom = document.getElementById("lead-phone-cc-custom");
  if (!sel) return;
  const cc = String(ccDigits||"").replace(/\D/g,"").replace(/^0+/,"") || "55";
  let found = false;
  for (let i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === cc) { sel.selectedIndex = i; found = true; break; }
  }
  if (!found) {
    for (let j = 0; j < sel.options.length; j++) {
      if (sel.options[j].value === "__custom__") { sel.selectedIndex = j; break; }
    }
    if (custom) custom.value = cc;
  } else if (custom) custom.value = "";
  leadPhoneSyncCustomCcVisibility();
}

function formatPhoneBR11(digitsRaw) {
  const d = String(digitsRaw||"").replace(/\D/g,"").slice(0,11);
  let out = "";
  if (d.length > 0) out += d.slice(0,2);
  if (d.length >= 3) out += " " + d.slice(2,3);
  if (d.length >= 4) out += " " + d.slice(3,7);
  if (d.length >= 8) out += "-" + d.slice(7,11);
  return out;
}

function splitStoredDigitsToCcAndNational(fullDigits, savedDial) {
  const d = normalizePhone(fullDigits);
  if (!d) return {cc:"55",national:""};
  const saved = savedDial ? normalizePhone(savedDial).replace(/^0+/,"") : "";
  if (saved && d.startsWith(saved) && d.length > saved.length) return {cc:saved,national:d.slice(saved.length)};
  if (d.startsWith("55") && d.length >= 13 && d.length <= 15) return {cc:"55",national:d.slice(2)};
  if (d.length === 12 && d.startsWith("39") && d.charAt(2) === "3") return {cc:"39",national:d.slice(2)};
  if (d.length === 11) return {cc:"55",national:d};
  const merged = LEAD_PHONE_CC_PREFIXES.slice().sort((a,b) => b.length - a.length);
  for (let i = 0; i < merged.length; i++) {
    const p = merged[i];
    if (d.startsWith(p) && d.length > p.length) return {cc:p,national:d.slice(p.length)};
  }
  return {cc:"55",national:d};
}

function isValidEmail(raw) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(raw||"").trim()); }

function isValidPhoneLeadForm() {
  const cc = leadPhoneGetDialCode();
  const nat = leadPhoneGetNationalDigits();
  if (!/^[1-9]\d{0,2}$/.test(cc)) return false;
  if (!nat) return false;
  const b = leadPhoneNationalBounds(cc);
  if (nat.length < b.min || nat.length > b.max) return false;
  if (b.firstDigit && nat.charAt(0) !== b.firstDigit) return false;
  const full = cc + nat;
  return full.length >= 10 && full.length <= 15;
}

document.getElementById("lead-phone").addEventListener("input", e => {
  const el = e.target;
  const digits = normalizePhone(el.value);
  const cc = leadPhoneGetDialCode();
  const b = leadPhoneNationalBounds(cc);
  const slice = digits.slice(0, b.max);
  el.value = (cc === "55" && !slice.startsWith("39")) ? formatPhoneBR11(slice) : slice;
});

document.getElementById("lead-phone-cc").addEventListener("change", () => {
  leadPhoneSyncCustomCcVisibility();
  leadPhoneRefreshNationalFieldConstraints();
  const nat = document.getElementById("lead-phone");
  const d = normalizePhone(nat.value);
  const cc = leadPhoneGetDialCode();
  if (cc === "55" && !d.startsWith("39")) nat.value = formatPhoneBR11(d);
});

document.getElementById("lead-phone-cc-custom").addEventListener("input", e => {
  e.target.value = normalizePhone(e.target.value).slice(0,3);
  leadPhoneRefreshNationalFieldConstraints();
});

document.addEventListener("DOMContentLoaded", () => { leadPhoneRefreshNationalFieldConstraints(); });
</script>
