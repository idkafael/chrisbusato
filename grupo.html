  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #EDE8DF;
      font-family: 'Inter', sans-serif;
      color: #2C2218;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #F2EDE3;
      border-radius: 28px;
      padding: 3rem 2rem;
      max-width: 400px;
      width: 100%;
      border: 0.5px solid #C5BAA8;
      box-shadow: 0 8px 32px rgba(44,34,24,0.10);
      text-align: center;
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(92,122,90,0.12);
      border: 1.5px solid rgba(92,122,90,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .icon-wrap svg {
      width: 36px;
      height: 36px;
      fill: #5C7A5A;
    }

    h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #2C2218;
      margin-bottom: 0.5rem;
    }

    .sub {
      font-size: 14px;
      color: #8A7D6B;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    /* Barra de progresso animada */
    .progress-track {
      height: 3px;
      background: rgba(92,122,90,0.15);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 1.75rem;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #5C7A5A;
      border-radius: 999px;
      animation: fillBar 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes fillBar {
      0%   { width: 0%; }
      60%  { width: 75%; }
      100% { width: 100%; }
    }

    .manual-link {
      font-size: 13px;
      color: #8A7D6B;
    }

    .manual-link a {
      color: #5C7A5A;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .manual-link a:hover { color: #4A6548; }

    /* Pontinhos de carregamento */
    .dots {
      display: inline-flex;
      gap: 5px;
      vertical-align: middle;
      margin-left: 4px;
    }
    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #8A7D6B;
      animation: blink 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
      40%            { opacity: 1;    transform: scale(1); }
    }
  </style>
</head>
<body>

<script>
var WA_URL = "https://chat.whatsapp.com/Bsv2jPif2JH8RHbsFc3LZC";

function sha256hex(str) {
  var enc = new TextEncoder();
  return crypto.subtle.digest('SHA-256', enc.encode(str)).then(function(buf) {
    return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
  });
}

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name) || '';
}

function firePixelAndRedirect() {
  var email = getParam('email').toLowerCase().trim();
  var phone = getParam('phone').replace(/\D/g,'');
  if (phone && !phone.startsWith('55')) phone = '55' + phone;

  function doTrackAndRedirect(ud) {
    try {
      if (Object.keys(ud).length) {
        fbq('init', '1659916645332253', ud);
      }
      fbq('track', 'Lead', { content_name: 'Grupo WhatsApp' });
    } catch(e) {}
    setTimeout(function() {
      window.location.href = WA_URL;
    }, 300);
  }

  if (email || phone) {
    var promises = [
      email ? sha256hex(email) : Promise.resolve(''),
      phone  ? sha256hex(phone)  : Promise.resolve('')
    ];
    Promise.all(promises).then(function(h) {
      var ud = {};
      if (h[0]) ud.em = h[0];
      if (h[1]) ud.ph = h[1];
      doTrackAndRedirect(ud);
    }).catch(function() {
      doTrackAndRedirect({});
    });
  } else {
    doTrackAndRedirect({});
  }
}

// Dispara após 1.6s (tempo da animação da barra)
setTimeout(firePixelAndRedirect, 1600);
</script>
